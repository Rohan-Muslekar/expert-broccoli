<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat Detection Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game" width="1200" height="800"></canvas>
    <div id="hud">
        <div id="cheat-hud">
            <span id="cheat-f5" class="cheat-label">F5 Aimbot</span>
            <span id="cheat-f6" class="cheat-label">F6 Speed</span>
            <span id="cheat-f7" class="cheat-label">F7 Wallhack</span>
            <span id="cheat-f8" class="cheat-label">F8 Trigger</span>
        </div>
    </div>
    <div id="overlay" class="hidden">
        <p>Connecting...</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
