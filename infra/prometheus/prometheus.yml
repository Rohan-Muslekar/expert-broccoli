global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: game-server
    static_configs:
      - targets: ["game-server:8080"]

  - job_name: feature-engine
    static_configs:
      - targets: ["feature-engine:9090"]

  - job_name: ml-service
    static_configs:
      - targets: ["ml-service:8000"]
