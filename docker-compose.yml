services:
  # --- Kafka (KRaft, single broker) ---
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/create-topics.sh:/create-topics.sh
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    environment:
      KAFKA_BROKER: kafka:9092

  # --- Game Simulator ---
  game-server:
    build: ./game-server
    ports:
      - "8080:8080"
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
      BOT_COUNT: "8"
      BOT_CHEATS_ENABLED: "true"
      METRICS_ENABLED: "true"
      PRODUCE_TOPIC: "features.computed"
      ALERTS_TOPIC: "alerts.detections"
    depends_on:
      kafka:
        condition: service_healthy

  game-client:
    build: ./game-client
    ports:
      - "80:80"
    depends_on:
      - game-server

  # --- ML Service (Python) ---
  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    environment:
      KAFKA_BROKERS: "kafka:9092"
      CONSUME_TOPIC: "features.computed"
      ALERTS_TOPIC: "alerts.detections"
      MODEL_DIR: "/app/saved_models"
      CS2CD_DATASET_PATH: "/app/datasets/cs2cd"
      AUTO_TRAIN_THRESHOLD: "0"
      ANOMALY_STD_MULTIPLIER: "3.0"
      ALERT_COOLDOWN_SECONDS: "5"
      XGBOOST_CONFIDENCE_THRESHOLD: "0.8"
    volumes:
      - ml-models:/app/saved_models
      - ./datasets/cs2cd:/app/datasets/cs2cd:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  # --- Observability ---
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=24h"
    depends_on:
      - game-server

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/pipeline-health.json
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  ml-models:
